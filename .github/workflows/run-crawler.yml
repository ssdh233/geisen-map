name: Run Crawler
on:
  workflow_dispatch:
    inputs:
      crawler:
        description: 'select crawler(bemani/popn/sega/taiko)'     
        required: true
        default: 'sega'
      game:
        description: 'select game'     
        required: false
        default: 'maimai'
jobs:
  printInputs:
    runs-on: ubuntu-latest
    steps:
    - run: |
        echo "Crawler: ${{ github.event.inputs.crawler }}"
        echo "Game: ${{ github.event.inputs.game }}"

